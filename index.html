<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The British International School Abu Dhabi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #0d1b2e;
    color: white;
    height: 100vh;
    overflow: hidden;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 32px;
    background: white;
  }
  .logo { display: flex; align-items: center; gap: 12px; }

  .menu-btn {
    background: #0d1b2e;
    border: none;
    border-radius: 50%;
    width: 44px; height: 44px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 4px;
  }
  .menu-btn span { display: block; width: 18px; height: 2px; background: white; border-radius: 2px; }

  .hero {
    display: flex;
    align-items: center;
    height: calc(100vh - 76px);
    position: relative;
    overflow: hidden;
    background: linear-gradient(to bottom right, #0d1b2e 60%, #1a2e45);
  }

  .person {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-70%);
    height: 95%;
  }

  .stats {
    position: absolute;
    left: 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .stat { width: 160px; padding: 16px; border-radius: 10px; }
  .stat.teal   { background: #4bc8c8; }
  .stat.yellow { background: #f5b800; }
  .stat.blue   { background: #7ecfdc; }
  .stat .num   { font-size: 36px; font-weight: bold; color: #0d1b2e; }
  .stat .lbl   { font-size: 14px; font-weight: bold; color: #0d1b2e; }
  .stat .sub   { font-size: 11px; color: #0d1b2e; margin-top: 4px; }

  .content {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-55%);
  }
  .content h1 { font-size: 44px; font-weight: bold; margin-bottom: 8px; }
  .content p  { font-size: 18px; color: rgba(255,255,255,0.6); margin-bottom: 24px; }


</style>
</head>
